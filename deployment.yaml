# kubectl create secret docker-registry ghcr-auth-secret --docker-server=ghcr.io --docker-username=tomposgergo2 --docker-password=

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-13c-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-13c

  template:
    metadata:
      labels:
        app: cicd-13c

    spec:
      containers:
        - name: cicd-13c-container
          image: ghcr.io/tomposgergo2/k8s-cicd-13c:1773646931
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: ghcr-auth-secret

---

apiVersion: v1
kind: Service
metadata:
  name: cicd-13c-clusterip
spec:
  type: ClusterIP
  selector:
    app: cicd-13c
  ports: 
    - protocol: TCP
      port: 80
      targetPort: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cicd-13c-ingress
  annotations:
    # nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.32.0/24, 193.225.219.140/32 
    # nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx 

  rules:
    - host: cicd13c-tomposgergo.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cicd-13c-clusterip
                port:
                  number: 80  